<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICCS — Заявка отправлена</title>
  <link rel="icon" href="https://static.tildacdn.com/tild6339-3631-4461-b232-323637323339/ICCS_.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #ffffff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success-box {
      max-width: 600px;
      margin: 40px 20px;
      padding: 48px 32px;
      text-align: center;
      background: #ffffff;
      border: 1px solid #e0dcd4;
      border-radius: 16px;
      color: #333333;
    }
    .success-box h1 {
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 200;
      color: #333333;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0 0 16px;
    }
    .success-box p {
      font-size: 16px;
      line-height: 1.6;
      color: #666666;
      margin: 0 0 24px;
    }
    .success-box a {
      display: inline-block;
      padding: 14px 24px;
      background: #C5A55A;
      color: #ffffff;
      text-decoration: none;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 15px;
      transition: background 0.2s ease;
    }
    .success-box a:hover { background: #B08D3E; }
    .success-box a:focus-visible {
      outline: 2px solid #C5A55A;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="success-box">
    <h1 id="title">Your profile has been submitted!</h1>
    <p id="text">The administrator will review your application and you'll receive a confirmation by email.</p>
    <a id="link" href="/">View Coach Registry</a>
  </div>
  <script>
    var lang = localStorage.getItem('icf-lang') || 'en';
    var brand = 'Coach Registry';

    // Load brand name from config cache
    try {
      var cached = JSON.parse(
        localStorage.getItem('icf_config_cache') || '{}'
      );
      if (cached.data && cached.data.brandName) {
        brand = cached.data.brandName;
      }
    } catch (_e) { /* ignore */ }

    var msgs = {
      en: {
        title: 'Your profile has been submitted!',
        text: 'The ' + brand + ' administrator will review your application and you\'ll receive a confirmation by email.'
      },
      ru: {
        title: 'Ваш профиль отправлен!',
        text: 'Администратор ' + brand + ' рассмотрит заявку, и вы получите подтверждение по email.'
      },
      el: {
        title: 'Το προφίλ σας υποβλήθηκε!',
        text: 'Ο διαχειριστής του ' + brand + ' θα εξετάσει την αίτησή σας και θα λάβετε επιβεβαίωση μέσω email.'
      }
    };
    var links = {
      en: 'View Coach Registry',
      ru: 'Перейти в каталог коучей',
      el: 'Προβολή μητρώου coaches',
    };
    var m = msgs[lang] || msgs.en;
    document.getElementById('title').textContent = m.title;
    document.getElementById('text').textContent = m.text;
    document.getElementById('link').textContent = links[lang] || links.en;
    // Title is set in HTML
  </script>
</body>
</html>
